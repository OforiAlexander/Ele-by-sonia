services:
  - type: redis
    name: elegance-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: elegance-by-sconia
    runtime: node
    plan: starter
    buildCommand: yarn install --production=false && yarn build
    startCommand: yarn start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: elegance-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: elegance-redis
          property: connectionString
      - key: BASE_URL
        sync: false
      - key: BUSINESS_NAME
        sync: false
      - key: ALLOW_REGISTRATION
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      - key: OWNER_NAME
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_PHONE
        sync: false
      - key: OWNER_TEMP_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_REGION
        sync: false
      - key: AWS_S3_KEY
        sync: false
      - key: AWS_S3_SECRET
        sync: false
      - key: AWS_ENDPOINT_URL
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: MAX_IMAGE_SIZE
        value: "5242880"
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_CURRENCY
        value: GHS
      - key: RECAPTCHA_SECRET_KEY
        sync: false

databases:
  - name: elegance-db
    databaseName: elegance_sconia
    user: elegance_user
    plan: free
